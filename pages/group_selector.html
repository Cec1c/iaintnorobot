<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>群聊管理</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 760px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 22px;
      }

      label {
        display: block;
        margin: 16px 0 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        height: 36px;
        padding: 0 10px;
        border: 1px solid #9ca3af;
        border-radius: 6px;
        background: transparent;
        font: inherit;
      }

      button {
        height: 34px;
        padding: 0 12px;
        border: 1px solid #6b7280;
        border-radius: 6px;
        background: transparent;
        font: inherit;
        cursor: pointer;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: end;
        margin-top: 8px;
      }

      .field {
        min-width: 180px;
        flex: 1;
      }

      .status {
        margin-top: 14px;
        min-height: 22px;
        color: #4b5563;
      }

      .list {
        margin-top: 20px;
        padding: 0;
        list-style: none;
      }

      .list li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 10px 0;
        border-top: 1px solid #d1d5db;
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .muted {
        color: #6b7280;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>群聊管理</h1>

      <div class="row">
        <div class="field">
          <label for="groupId">添加群号</label>
          <input id="groupId" autocomplete="off" />
        </div>
        <div class="field">
          <label for="groupName">显示名称</label>
          <input id="groupName" autocomplete="off" />
        </div>
        <button id="addBtn" type="button">添加并启用</button>
        <button id="refreshBtn" type="button">刷新</button>
      </div>

      <div id="status" class="status"></div>
      <ul id="groupList" class="list"></ul>
    </main>

    <script>
      const endpointCandidates = [
        "/api/plugin/iar",
        "/api/plugins/iar",
        "/api/plugin/astrbot_plugin_i_aint_no_robot/iar",
        "/api/plugins/astrbot_plugin_i_aint_no_robot/iar",
        "/iar",
      ];

      let apiBase = endpointCandidates[0];
      const statusEl = document.getElementById("status");
      const listEl = document.getElementById("groupList");

      function setStatus(text) {
        statusEl.textContent = text;
      }

      async function request(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      function render(data) {
        const groups = data.groups || [];
        listEl.innerHTML = "";
        if (!groups.length) {
          const item = document.createElement("li");
          item.textContent = "还没有添加群聊";
          listEl.appendChild(item);
          return;
        }

        for (const group of groups) {
          const item = document.createElement("li");
          const title = document.createElement("div");
          const state = group.enabled ? "已启用" : "已停用";
          const ready = group.initialized === false ? "未初始化" : "已初始化";
          title.innerHTML = `<strong>${group.name}</strong><div class="muted">${group.group_id} / ${state} / ${ready}</div>`;

          const actions = document.createElement("div");
          actions.className = "actions";

          const toggle = document.createElement("button");
          toggle.type = "button";
          toggle.textContent = group.enabled ? "停用" : "启用";
          toggle.onclick = () => setGroupEnabled(group.group_id, !group.enabled);

          const remove = document.createElement("button");
          remove.type = "button";
          remove.textContent = "移除";
          remove.onclick = () => removeGroup(group.group_id);

          actions.append(toggle, remove);
          item.append(title, actions);
          listEl.appendChild(item);
        }
      }

      async function load() {
        try {
          const data = await loadGroups();
          render(data);
          setStatus("已加载");
        } catch (error) {
          setStatus(`加载失败：${error.message}`);
        }
      }

      async function addGroup() {
        const groupId = document.getElementById("groupId").value.trim();
        const name = document.getElementById("groupName").value.trim();
        if (!groupId) return setStatus("群号不能为空");
        try {
          await request(`${apiBase}/groups/add`, {
            method: "POST",
            body: JSON.stringify({ group_id: groupId, name, enabled: true }),
          });
          document.getElementById("groupId").value = "";
          document.getElementById("groupName").value = "";
          await load();
          setStatus("已添加");
        } catch (error) {
          setStatus(`添加失败：${error.message}`);
        }
      }

      async function setGroupEnabled(groupId, enabled) {
        try {
          await request(`${apiBase}/groups/enabled`, {
            method: "POST",
            body: JSON.stringify({ group_id: groupId, enabled }),
          });
          await load();
          setStatus(enabled ? "已启用" : "已停用");
        } catch (error) {
          setStatus(`修改失败：${error.message}`);
        }
      }

      async function removeGroup(groupId) {
        try {
          await request(`${apiBase}/groups/remove`, {
            method: "POST",
            body: JSON.stringify({ group_id: groupId }),
          });
          await load();
          setStatus("已移除");
        } catch (error) {
          setStatus(`移除失败：${error.message}`);
        }
      }

      document.getElementById("refreshBtn").onclick = load;
      document.getElementById("addBtn").onclick = addGroup;

      async function loadGroups() {
        let lastError;
        for (const base of endpointCandidates) {
          try {
            const data = await request(`${base}/groups`);
            apiBase = base;
            return data;
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("找不到插件 API");
      }

      load();
    </script>
  </body>
</html>
